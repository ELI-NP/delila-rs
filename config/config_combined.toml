# DELILA DAQ Configuration - PSD1 + PSD2 Combined Setup
#
# Topology:
#   Local Mac:    PSD2 Reader + Operator + Merger + Recorder + Monitor
#   Remote Linux: PSD1 Reader (172.18.4.147, DT5730B via USB)
#
# Node Agent usage:
#   Local:  ./target/release/node_agent -f config/agent_local.toml --start-all
#   Remote: ./target/release/node_agent -f config/agent_remote.toml --start-all

[operator]
experiment_name = "DELILA_Combined"

[network]

# Source 0: PSD1 (remote, DT5730B via USB on 172.18.4.147)
[[network.sources]]
id = 0
name = "psd1-dt5730"
type = "psd1"
host = "172.18.4.147"
bind = "tcp://*:5555"
command = "tcp://*:5560"
digitizer_url = "dig1://caen.internal/usb?link_num=0"
config_file = "config/digitizers/psd1_test.json"
pipeline_order = 1

# Source 1: PSD2 (local, DT5730S via network at 172.18.4.56)
[[network.sources]]
id = 1
name = "psd2-dt5730s"
type = "psd2"
bind = "tcp://*:5556"
command = "tcp://*:5561"
digitizer_url = "dig2://172.18.4.56"
config_file = "config/digitizers/psd2_56.json"
pipeline_order = 1

# Merger (local) - subscribe auto-resolved from source host
[network.merger]
publish = "tcp://*:5557"
command = "tcp://*:5570"
pipeline_order = 2

# Recorder (local)
[network.recorder]
subscribe = "tcp://localhost:5557"
command = "tcp://*:5580"
output_dir = "./data"
pipeline_order = 3

# Monitor (local)
[network.monitor]
subscribe = "tcp://localhost:5557"
command = "tcp://*:5590"
http_port = 8081
pipeline_order = 3
