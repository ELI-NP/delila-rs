# DELILA DAQ Configuration - ELIADE @ es1 (172.18.4.131)
# Hardware: 4x V1725 (DPP-PHA, clover HPGe) + 1x V1730C (DPP-PSD), A3818 optical link 0.
#
# Board->node mapping is taken from this host's CoMPASS history
# (~/dmitry/clover31a_sc: 4x V1725 PHA on link0 nodes 0-3). The V1730 PSD node
# is a best guess (next in the daisy chain) — CONFIRM all link/node assignments
# with caen_info once the crate is powered on:
#   LD_LIBRARY_PATH=/opt/delila-caen/lib target/release/caen_info \
#     "dig1://caen.internal/optical_link?link_num=0&conet_node=N"
# The per-board JSONs below are shared templates; split + tune per board (and
# set the master/slave start wiring) after the boards are verified live.
#
# Build/run on es1 (CAEN FELib in isolated prefix — see scripts/setup_caen_felib.sh):
#   CAEN_PREFIX=/opt/delila-caen \
#   BINDGEN_EXTRA_CLANG_ARGS="-isystem /usr/lib/gcc/x86_64-linux-gnu/9/include" \
#   cargo build --release --bins
#   LD_LIBRARY_PATH=/opt/delila-caen/lib ./scripts/start_daq.sh config/config_es1.toml

[operator]
experiment_name = "ELIADE_es1"
port = 9090

# Port auto-allocation: data = 7000 + id, command = 7100 + id

[network]

# --- 4x V1725 DPP-PHA (clover HPGe), 250 MHz -> 4 ns timestamp step ---
[[network.sources]]
id = 0
name = "PHA1-0"
type = "pha1"
digitizer_url = "dig1://caen.internal/optical_link?link_num=0&conet_node=0"
config_file = "config/digitizers/pha1_template.json"
pipeline_order = 1
time_step_ns = 4.0

[[network.sources]]
id = 1
name = "PHA1-1"
type = "pha1"
digitizer_url = "dig1://caen.internal/optical_link?link_num=0&conet_node=1"
config_file = "config/digitizers/pha1_template.json"
pipeline_order = 1
time_step_ns = 4.0

[[network.sources]]
id = 2
name = "PHA1-2"
type = "pha1"
digitizer_url = "dig1://caen.internal/optical_link?link_num=0&conet_node=2"
config_file = "config/digitizers/pha1_template.json"
pipeline_order = 1
time_step_ns = 4.0

[[network.sources]]
id = 3
name = "PHA1-3"
type = "pha1"
digitizer_url = "dig1://caen.internal/optical_link?link_num=0&conet_node=3"
config_file = "config/digitizers/pha1_template.json"
pipeline_order = 1
time_step_ns = 4.0

# --- 1x V1730C DPP-PSD, 500 MHz -> 2 ns (default). Node is provisional. ---
[[network.sources]]
id = 4
name = "PSD1-0"
type = "psd1"
digitizer_url = "dig1://caen.internal/optical_link?link_num=0&conet_node=4"
config_file = "config/digitizers/psd1_test.json"
pipeline_order = 1

# --- Pipeline components ---

[network.merger]
publish = "tcp://*:5557"
command = "tcp://*:5570"
pipeline_order = 2

[network.recorder]
subscribe = "tcp://localhost:5557"
command = "tcp://*:5580"
output_dir = "./data"
pipeline_order = 3

[network.monitor]
subscribe = "tcp://localhost:5557"
command = "tcp://*:5590"
http_port = 8081
pipeline_order = 3
