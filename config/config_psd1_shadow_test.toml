# DELILA DAQ Configuration - PSD1 Shadow Rollover Validation (Step 3-3)
# Hardware: DT5730B (Serial: 990, DPP-PSD, USB, 8ch, 14-bit, 500 MS/s)
#
# Purpose: run the PSD1 pipeline with the shadow RolloverTracker
#   instrumentation enabled so we can count old-vs-new divergences on real
#   hardware.  Authoritative output is unchanged; shadow runs in parallel
#   and logs `tracing::error!` on mismatch (first 3 events in detail, then
#   counts silently).  A 30-minute run covers ~200 rollovers of the 32-bit
#   board time tag @ 2 ns tick — plenty of sample size for a fast pulser.
#
# Differences from config_psd1_test.toml:
#   - Operator port 9090 → 9091 (Side3 runs Cockpit on 9090)
#   - experiment_name tag so run metadata is distinguishable
#
# Usage: ./scripts/start_daq.sh config/config_psd1_shadow_test.toml --no-mongo

[operator]
experiment_name = "PSD1_Shadow_3_3"
port = 9091

[network]
# Real PSD1 digitizer (DT5730 via USB)
[[network.sources]]
id = 0
name = "psd1-dt5730"
type = "psd1"
bind = "tcp://*:5555"
command = "tcp://*:5560"
digitizer_url = "dig1://caen.internal/usb?link_num=0"
config_file = "config/digitizers/psd1_test.json"
pipeline_order = 1

# Merger
[network.merger]
publish = "tcp://*:5557"
command = "tcp://*:5570"
pipeline_order = 2

# Recorder
[network.recorder]
subscribe = "tcp://localhost:5557"
command = "tcp://*:5580"
output_dir = "./data"
pipeline_order = 3

# Monitor
[network.monitor]
subscribe = "tcp://localhost:5557"
command = "tcp://*:5590"
http_port = 8081
pipeline_order = 3

[operator.influxdb]
url = "http://localhost:8181"
database = "delila"
interval_secs = 2
