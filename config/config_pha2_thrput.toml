# DELILA DAQ Configuration - PHA2 Throughput Sweep
# Purpose: 172.18.4.56 → reader host throughput measurement (TestPulse trigger)
# Goal: confirm PHA2 reaches PSD2-equivalent saturation (~43 kHz/board, safe ~30 kHz)
# Usage: ./scripts/start_daq.sh config/config_pha2_thrput.toml --no-mongo
# Recorder is intentionally absent so reader→merger→monitor runs at line rate.

[operator]
experiment_name = "PHA2_Throughput"
port = 9090

[network]
[[network.sources]]
id = 0
name = "pha2-thrput"
type = "pha2"
bind = "tcp://*:5555"
command = "tcp://*:5560"
digitizer_url = "dig2://172.18.4.56"
config_file = "config/digitizers/pha2_thrput.json"
pipeline_order = 1

[network.merger]
subscribe = ["tcp://localhost:5555"]
publish = "tcp://*:5557"
command = "tcp://*:5570"
pipeline_order = 2

[network.monitor]
subscribe = "tcp://localhost:5557"
command = "tcp://*:5590"
http_port = 8081
pipeline_order = 3
