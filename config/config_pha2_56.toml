# DELILA DAQ Configuration - PHA2 Real Hardware Test
# Hardware: VX2730 (Serial: 52622, DPP_PHA, 32ch, Ethernet, 172.18.4.56)
# Phase 1: dummy decoder emits fake monotonic events for pipeline validation.
# See TODO/51_pha2_integration.md for the full integration plan.
# Usage: ./scripts/start_daq.sh config/config_pha2_56.toml

[operator]
experiment_name = "PHA2_Test"
port = 9090

[network]
# Real PHA2 digitizer
[[network.sources]]
id = 0
name = "pha2-real"
type = "pha2"
bind = "tcp://*:5555"
command = "tcp://*:5560"
digitizer_url = "dig2://172.18.4.56"
config_file = "config/digitizers/pha2_56.json"
pipeline_order = 1

# Merger
[network.merger]
subscribe = ["tcp://localhost:5555"]
publish = "tcp://*:5557"
command = "tcp://*:5570"
pipeline_order = 2

# Recorder
[network.recorder]
subscribe = "tcp://localhost:5557"
command = "tcp://*:5580"
output_dir = "./data"
pipeline_order = 3

# Monitor
[network.monitor]
subscribe = "tcp://localhost:5557"
command = "tcp://*:5590"
http_port = 8081
pipeline_order = 3
