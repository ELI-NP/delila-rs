# DELILA DAQ Configuration - AMax FW VX2730 at 172.18.4.56
# Phase 1 smoke test: no register writes (relies on amax_viewer for pre-config)

[operator]
experiment_name = "AMax_56"
port = 9090

# Run history is persisted to MongoDB on the gant dev box. The CLI flags
# `--mongodb-uri` / `--mongodb-database` override these values when present.
[operator.mongodb]
uri = "mongodb://delila:delila_pass@localhost:27017"
database = "delila"

[network]

[[network.sources]]
id = 0
name = "amax-56"
type = "amax"
bind = "tcp://*:5555"
command = "tcp://*:5560"
digitizer_url = "dig2://192.168.14.10"
#digitizer_url = "dig2://172.18.4.56"
#config_file = "config/digitizers/RegisterFile.json"
config_file = "config/digitizers/amax_56_10G.json"
pipeline_order = 1
decode_workers = 8

[[network.sources]]
id = 1
name = "amax-57"
type = "amax"
bind = "tcp://*:5556"
command = "tcp://*:5561"
digitizer_url = "dig2://192.168.14.11"
#config_file = "config/digitizers/RegisterFile.json"
config_file = "config/digitizers/amax_56_10G_slave.json"
pipeline_order = 1
decode_workers = 8

[network.merger]
subscribe = ["tcp://localhost:5555","tcp://localhost:5556"]
publish = "tcp://*:5557"
command = "tcp://*:5570"
pipeline_order = 2

[network.recorder]
subscribe = "tcp://localhost:5557"
command = "tcp://*:5580"
output_dir = "./data"
pipeline_order = 3

[network.monitor]
subscribe = "tcp://localhost:5557"
command = "tcp://*:5590"
http_port = 8081
pipeline_order = 3
