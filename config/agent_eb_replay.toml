# Node Agent - Replay DAQ Stack
#
# Manages 17 processes for the .delila replay stack: 12 source replays,
# merger, recorder, monitor, online EB, EB monitor stub, and Operator.
# MongoDB is intentionally omitted from the Operator argv — Operator
# detects the missing URI and runs without run-history persistence.
#
# Start: ./target/release/node_agent -f config/agent_eb_replay.toml --start-all
# API:   http://localhost:9009/api/status
#
# IMPORTANT: edit the `args` entries for each replay-N below to point at
# the actual `.delila` files you want to replay. The default points at one
# small file from data/E9/ as a smoke-test starting point.

[agent]
name = "replay-stack"
port = 9009
log_buffer_lines = 2000

# ── Layer 3 downstream consumers ───────────────────────────────────────

[[process]]
name = "monitor"
command = "./target/release/monitor"
args = ["--config", "config/config_eb_replay_stack.toml"]
auto_restart = true
restart_delay_secs = 3

[[process]]
name = "recorder"
command = "./target/release/recorder"
args = ["--config", "config/config_eb_replay_stack.toml"]
auto_restart = true
restart_delay_secs = 3

[[process]]
name = "online_event_builder"
command = "./target/release/online_event_builder"
args = ["--config", "config/config_eb_replay_stack.toml", "--run-id", "9999"]
auto_restart = true
restart_delay_secs = 3

# EB Monitor stub — passive SUB-only observer, exits cleanly on EOS.
[[process]]
name = "eb_monitor_cli"
command = "./target/release/eb_monitor_cli"
args = ["--subscribe", "tcp://localhost:5610", "--interval-secs", "2"]
auto_restart = false
restart_delay_secs = 5

# ── Layer 2 fan-in ─────────────────────────────────────────────────────

[[process]]
name = "merger"
command = "./target/release/merger"
args = ["--config", "config/config_eb_replay_stack.toml"]
auto_restart = true
restart_delay_secs = 3

