# DELILA DAQ Configuration - PSD1 Distributed Setup
# Reader runs on 172.18.4.147 (USB-connected DT5730B)
# Operator + Merger + Recorder + Monitor run on the local machine
#
# Usage: ./scripts/start_daq.sh config/config_psd1_distributed.toml
#   - Local: Operator, Merger, Recorder, Monitor auto-started
#   - Remote (172.18.4.147): Reader must be started manually:
#     ./reader --config config/config_psd1_distributed.toml --source-id 0
#
# Merger subscribe addresses are auto-resolved from source host field.

[operator]
experiment_name = "PSD1_Test"
port = 9090

[network]
# Remote PSD1 Reader on 172.18.4.147 (DT5730B via USB)
[[network.sources]]
id = 0
name = "psd1-dt5730"
type = "psd1"
host = "172.18.4.147"
bind = "tcp://*:5555"
command = "tcp://*:5560"
digitizer_url = "dig1://caen.internal/usb?link_num=0"
config_file = "config/digitizers/psd1_test.json"
pipeline_order = 1

# Merger (local) - subscribe auto-resolved from source host
[network.merger]
publish = "tcp://*:5557"
command = "tcp://*:5570"
pipeline_order = 2

# Recorder (local)
[network.recorder]
subscribe = "tcp://localhost:5557"
command = "tcp://*:5580"
output_dir = "./data"
pipeline_order = 3

# Monitor (local)
[network.monitor]
subscribe = "tcp://localhost:5557"
command = "tcp://*:5590"
http_port = 8081
pipeline_order = 3
