# Node Agent - Replay DAQ Stack (Option B)
#
# 6 processes: 1 merger-impersonator replay + recorder + monitor + EB +
# eb_monitor_cli + operator. No real Merger, no demultiplexing.
#
# Start: ./target/release/node_agent -f config/agent_eb_replay_b.toml --start-all
# API:   http://localhost:9009/api/status

[agent]
name = "replay-stack-b"
port = 9009
log_buffer_lines = 2000

# ── Layer 3 downstream consumers ───────────────────────────────────────

[[process]]
name = "monitor"
command = "./target/release/monitor"
args = ["--config", "config/config_eb_replay_stack_b.toml"]
auto_restart = true
restart_delay_secs = 3

[[process]]
name = "recorder"
command = "./target/release/recorder"
args = ["--config", "config/config_eb_replay_stack_b.toml"]
auto_restart = true
restart_delay_secs = 3

[[process]]
name = "online_event_builder"
command = "./target/release/online_event_builder"
args = ["--config", "config/config_eb_replay_stack_b.toml", "--run-id", "9999"]
auto_restart = true
restart_delay_secs = 3

# Passive observer of EB PUB stream — exits on EOS.
[[process]]
name = "eb_monitor_cli"
command = "./target/release/eb_monitor_cli"
args = ["--subscribe", "tcp://localhost:5610", "--interval-secs", "2"]
auto_restart = false
restart_delay_secs = 5

# ── Layer 1: single Merger-impersonator replay ─────────────────────────

[[process]]
name = "merger_replay"
command = "./target/release/delila_merger_replay"
args = ["--config", "config/config_eb_replay_stack_b.toml", "--source-id", "0",
        "--input", "data/E9/run0382_0000_Fission2026.delila",
        "data/E9/run0382_0001_Fission2026.delila",
        "data/E9/run0382_0002_Fission2026.delila",
        "data/E9/run0382_0003_Fission2026.delila",
        "data/E9/run0382_0004_Fission2026.delila",
        "data/E9/run0382_0005_Fission2026.delila",
        "data/E9/run0382_0006_Fission2026.delila",
        "data/E9/run0382_0007_Fission2026.delila",
        "data/E9/run0382_0008_Fission2026.delila",
        "data/E9/run0382_0009_Fission2026.delila",
        "data/E9/run0382_0010_Fission2026.delila",
        "data/E9/run0382_0011_Fission2026.delila",
        "data/E9/run0382_0012_Fission2026.delila",
        "data/E9/run0382_0013_Fission2026.delila",
        "data/E9/run0382_0014_Fission2026.delila",
        "data/E9/run0382_0015_Fission2026.delila",
        "data/E9/run0382_0016_Fission2026.delila",
        "data/E9/run0382_0017_Fission2026.delila",
        "data/E9/run0382_0018_Fission2026.delila",
        "data/E9/run0382_0019_Fission2026.delila"]
auto_restart = true
restart_delay_secs = 3

# ── Control plane ──────────────────────────────────────────────────────

[[process]]
name = "operator"
command = "./target/release/operator"
args = ["--config", "config/config_eb_replay_stack_b.toml"]
auto_restart = true
restart_delay_secs = 5
