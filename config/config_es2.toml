# DELILA DAQ Configuration - ELIADE @ es2 (172.18.4.132)
# Hardware: 1x V1725 (DPP-PHA, HPGe / Ge detector), A3818 optical link 0.
#   Board confirmed via `caen-toolbox dig1 info -c OPTICAL_LINK -l 0 -n 0`:
#     V1725, PID/Serial = 217, Board ID 0x6BD, at port(link) 0 / conet_node 0.
#   V1725 = 16 ch, 250 MS/s -> 4 ns timestamp step.
#
# Build on es2 (CAEN FELib isolated prefix; es2 needs the gcc-9 include for bindgen):
#   CAEN_PREFIX=/opt/delila-caen \
#   BINDGEN_EXTRA_CLANG_ARGS="-isystem /usr/lib/gcc/x86_64-linux-gnu/9/include" \
#   cargo build --release --bins
#
# Run on es2:
#   LD_LIBRARY_PATH=/opt/delila-caen/lib ./scripts/start_daq.sh config/config_es2.toml
#
# Verify link/node if the crate is re-cabled:
#   caen-toolbox dig1 info -c OPTICAL_LINK -l 0 -n 0 /tmp/v1725.dat

[operator]
experiment_name = "ELIADE_es2"
port = 9090

# Port auto-allocation: data = 7000 + id, command = 7100 + id

[network]

# --- 1x V1725 DPP-PHA (HPGe), 250 MHz -> 4 ns timestamp step ---
[[network.sources]]
id = 0
name = "PHA1-0"
type = "pha1"
digitizer_url = "dig1://caen.internal/optical_link?link_num=0&conet_node=0"
config_file = "config/digitizers/es2_v1725_pha.json"
pipeline_order = 1
time_step_ns = 4.0

# --- Pipeline components ---

[network.merger]
publish = "tcp://*:5557"
command = "tcp://*:5570"
pipeline_order = 2

[network.recorder]
subscribe = "tcp://localhost:5557"
command = "tcp://*:5580"
output_dir = "./data"
pipeline_order = 3

[network.monitor]
subscribe = "tcp://localhost:5557"
command = "tcp://*:5590"
http_port = 8081
pipeline_order = 3
