[global]
port = 8082
Theme = default
Comment = 3MV_2026 DAQ Electronic Logbook

[3MV_2026]
Theme = default
Comment = 3MV_2026 DAQ Logbook

; Attributes
Attributes = Author, Type, Category, Subject, Run Number
; Author is free-text input (no Options = restriction)
Options Type = Routine, Run Summary, Configuration, Problem, Note
Options Category = DAQ, Detector, Beam, General
Required Attributes = Author, Type, Subject

; Display
Reverse sort = 1
Quick filter = Type, Category, Author
Display search = 1
Menu commands = New, Edit, Delete, Reply, Find, Last day, Last 10

; Attachments
Max attachments = 50

; Time format
Time format = %Y-%m-%d %H:%M:%S
