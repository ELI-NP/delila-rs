[package]
name = "delila-rs"
version = "0.1.0"
edition = "2021"
description = "High-performance DAQ system for nuclear physics experiments"
license = "MIT"

[dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }

# ZeroMQ (Tokio bindings)
tmq = "0.4"
zmq = "0.10"
futures = "0.3"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rmp-serde = "1"
toml = "0.8"

# Error handling
thiserror = "1"
anyhow = "1"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Random (for emulator)
rand = "0.8"
rand_distr = "0.4"

# High-performance synchronization primitives
parking_lot = "0.12"
dashmap = "6"

# Checksum
xxhash-rust = { version = "0.8", features = ["xxh64"] }

# CLI argument parsing
clap = { version = "4", features = ["derive", "env"] }

# Web API
axum = "0.7"
tower-http = { version = "0.5", features = ["cors", "compression-gzip"] }

# Swagger / OpenAPI
utoipa = { version = "4", features = ["axum_extras"] }
utoipa-swagger-ui = { version = "7", features = ["axum"] }
bytes = "1.11.0"

# MongoDB
mongodb = "3"
bson = "2"
chrono = { version = "0.4", features = ["serde"] }

[build-dependencies]
bindgen = "0.70"
cc = "1"

[dev-dependencies]
tokio-test = "0.4"

[[bin]]
name = "emulator"
path = "src/bin/emulator.rs"

[[bin]]
name = "data_sink"
path = "src/bin/data_sink.rs"

[[bin]]
name = "merger"
path = "src/bin/merger.rs"

[[bin]]
name = "controller"
path = "src/bin/controller.rs"

[[bin]]
name = "operator"
path = "src/bin/operator.rs"

[[bin]]
name = "caen_info"
path = "src/bin/caen_info.rs"

[[bin]]
name = "monitor"
path = "src/bin/monitor.rs"

[[bin]]
name = "recorder"
path = "src/bin/recorder.rs"

[[bin]]
name = "storage_bench"
path = "src/bin/storage_bench.rs"

[[bin]]
name = "recover"
